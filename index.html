<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI-RUNNER | Deep Space Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #0051ff;
            --accent: #7d00ff;
            --bg-dark: #010208;
        }

        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Weltraum-Hintergrund Layer */
        .space-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        /* Dynamischer Nebel */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(125, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.15) 0%, transparent 40%);
            filter: blur(60px);
            animation: nebulaPulse 10s ease-in-out infinite alternate;
        }

        @keyframes nebulaPulse {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 1; transform: scale(1.1); }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* CRT Scanline Effekt */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Main UI */
        .content { 
            width: 100%; 
            max-width: 480px; 
            padding: 50px 20px; 
            z-index: 2;
        }

        .panel { 
            background: rgba(10, 20, 40, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 210, 255, 0.4); 
            border-radius: 30px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        h1 { 
            font-size: 2.2rem;
            margin-bottom: 35px;
            letter-spacing: 12px;
            background: linear-gradient(to bottom, #fff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5));
        }

        input { 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(0, 210, 255, 0.2); 
            color: white; 
            border-radius: 15px; 
            transition: 0.3s;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(90deg, var(--secondary), var(--primary)); 
            border: none; 
            color: white; 
            font-weight: bold; 
            letter-spacing: 3px;
            border-radius: 15px; 
            cursor: pointer; 
            margin-top: 15px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover { 
            box-shadow: 0 0 25px var(--secondary);
            transform: scale(1.02);
        }

        /* Leaderboard UI */
        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-box {
            flex: 1;
            background: rgba(0, 210, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .stat-label { font-size: 0.65rem; color: var(--primary); text-transform: uppercase; opacity: 0.8; }
        .stat-value { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 5px; }

        #leaderboard-container { 
            max-height: 380px; 
            overflow-y: auto; 
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; color: var(--primary); border-bottom: 1px solid var(--primary); font-size: 0.75rem; text-align: left;}
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; text-align: left;}

        .gold { color: #FFD700; text-shadow: 0 0 8px rgba(255, 215, 0, 0.6); }
        .me-row { background: rgba(0, 210, 255, 0.15) !important; }

        #auth-error { font-size: 0.8rem; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>
    <div class="space-container" id="space">
        <div class="nebula"></div>
    </div>

    <div class="content">
        <section id="auth-section" class="panel">
            <h1>PI-RUNNER</h1>
            <input type="text" id="username" placeholder="NAME">
            <input type="password" id="password" placeholder="PASSWORT">
            <button onclick="login()">LOGIN</button>
            <p id="auth-error" style="color: #ff4444;"></p>
        </section>

        <section id="leaderboard-section" class="panel" style="display: none;">
            <h2 id="welcome-name" style="margin-top:0; letter-spacing: 2px;">---</h2>
            
            <div class="stats-row">
                <div class="stat-box">
                    <span class="stat-label">Highscore</span>
                    <span class="stat-value" id="my-score">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Sektor-Rang</span>
                    <span class="stat-value" id="my-rank">?</span>
                </div>
            </div>

            <div id="leaderboard-container">
                <table id="leaderboard-table">
                    <thead><tr><th>#</th><th>PLAYER</th><th>SCORE</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <button onclick="auth.signOut()" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: #555; font-size: 0.7rem; margin-top: 30px;">DISCONNECT</button>
        </section>
    </div>

    <script>
        // Space Background Script
        const space = document.getElementById('space');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            space.appendChild(star);
        }

        // Firebase Logic (Unverändert)
        const firebaseConfig = {
            apiKey: "AIzaSyA0Et1D50vP8KnaRC1nyNN5dNO0Gqpqq7c",
            authDomain: "lpmzt-5c267.firebaseapp.com",
            projectId: "lpmzt-5c267",
            storageBucket: "lpmzt-5c267.firebasestorage.app",
            messagingSenderId: "378438452791",
            appId: "1:378438452791:web:33bec3f294a63aa41361b2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const email = document.getElementById('username').value.trim().toLowerCase() + "@pi.quest";
            auth.signInWithEmailAndPassword(email, document.getElementById('password').value).catch(e => {
                document.getElementById('auth-error').innerText = "IDENTITÄT NICHT VERIFIZIERT";
            });
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-section').style.display = user ? 'none' : 'block';
            document.getElementById('leaderboard-section').style.display = user ? 'block' : 'none';
            if(user) loadLeaderboard(user.uid);
        });

        function loadLeaderboard(uid) {
            db.collection("users").orderBy("highscore", "desc").limit(100).onSnapshot(snap => {
                const tbody = document.querySelector('#leaderboard-table tbody');
                tbody.innerHTML = "";
                let index = 1;
                snap.forEach(doc => {
                    const p = doc.data();
                    const isMe = doc.id === uid;
                    if(isMe) {
                        document.getElementById('welcome-name').innerText = (p.username || "Spieler").toUpperCase();
                        document.getElementById('my-score').innerText = p.highscore || 0;
                        document.getElementById('my-rank').innerText = index;
                    }
                    tbody.innerHTML += `<tr class="${isMe ? 'me-row' : ''}">
                        <td class="${index <= 3 ? 'gold' : ''}">${index}</td>
                        <td style="font-weight: ${isMe ? 'bold' : 'normal'}">${p.username || 'Unbekannt'}</td>
                        <td style="color: var(--primary);">${(p.highscore || 0).toLocaleString()}</td></tr>`;
                    index++;
                });
            });
        }
    </script>
</body>
</html>
