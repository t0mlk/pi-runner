<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI-RUNNER | Infinity Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #0051ff;
            --bg-dark: #050510;
        }

        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            overflow: hidden; /* Verhindert Scrollen des Bodys */
        }

        /* Maximale Sternen-Animation */
        .stars-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #101530 0%, #050510 100%);
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: moveStars linear infinite;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        /* Content & Panel */
        .content { 
            width: 100%; 
            max-width: 450px; 
            padding: 40px 20px; 
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel { 
            background: rgba(15, 25, 50, 0.75); 
            backdrop-filter: blur(12px); 
            border: 2px solid var(--primary); 
            border-radius: 25px; 
            padding: 35px; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        h1 { 
            color: var(--primary); 
            letter-spacing: 6px; 
            margin-bottom: 25px; 
            text-shadow: 0 0 10px var(--primary);
            font-size: 2.2rem;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: rgba(0,0,0,0.7); 
            border: 1px solid #304060; 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,210,255,0.5); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Leaderboard-Verschönerung */
        .score-badge-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 210, 255, 0.1);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            flex: 1;
        }

        .stat-label { font-size: 0.7rem; display: block; opacity: 0.7; margin-bottom: 5px; }
        .stat-val { font-size: 1.2rem; font-weight: bold; }

        #leaderboard-container { 
            max-height: 300px; 
            overflow-y: auto; 
            margin-top: 20px; 
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 15px; 
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; border-bottom: 2px solid var(--primary); color: var(--primary); font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .gold { color: #ffd700; font-weight: bold; text-shadow: 0 0 5px gold; }
        .my-row { background: rgba(0, 210, 255, 0.2); }

        #auth-error { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="stars-wrapper" id="star-field"></div>

    <div class="content">
        <section id="auth-section" class="panel">
            <h1>PI-RUNNER</h1>
            <input type="text" id="username" placeholder="Name">
            <input type="password" id="password" placeholder="Passwort">
            <button onclick="login()">ANMELDEN</button>
            <p id="auth-error" style="color: #ff4747;"></p>
        </section>

        <section id="leaderboard-section" class="panel" style="display: none;">
            <h2 id="welcome-name" style="margin: 0; color: white;">---</h2>
            
            <div class="score-badge-container">
                <div class="stat-item">
                    <span class="stat-label">REKORD</span>
                    <span class="stat-val" id="my-score">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">RANG</span>
                    <span class="stat-val" id="my-rank">?</span>
                </div>
            </div>

            <h3 style="color: var(--primary); font-size: 0.9rem; letter-spacing: 2px;">TOP 100 LIGA</h3>
            <div id="leaderboard-container">
                <table id="leaderboard-table">
                    <thead><tr><th>#</th><th>NAME</th><th>PUNKTE</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <button onclick="auth.signOut()" style="background: rgba(255,255,255,0.05); border: 1px solid #444; margin-top: 20px; font-size: 0.8rem;">LOGOUT</button>
        </section>
    </div>

    <script>
        // Sternen-Generator (Hohe Dichte & verschiedene Layer)
        function createStars() {
            const field = document.getElementById('star-field');
            const count = 250; // Viel mehr Sterne!
            
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Zufällige Größe (einige winzig, einige größer)
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                
                // Zufällige Position
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                // Zufällige Animationsdauer für Parallax-Effekt
                const duration = (Math.random() * 50 + 20) + 's';
                star.style.animationDuration = duration;
                star.style.animationDelay = '-' + (Math.random() * 50) + 's';
                
                field.appendChild(star);
            }
        }
        createStars();

        // Firebase Logic (Unverändert)
        const firebaseConfig = {
            apiKey: "AIzaSyA0Et1D50vP8KnaRC1nyNN5dNO0Gqpqq7c",
            authDomain: "lpmzt-5c267.firebaseapp.com",
            projectId: "lpmzt-5c267",
            storageBucket: "lpmzt-5c267.firebasestorage.app",
            messagingSenderId: "378438452791",
            appId: "1:378438452791:web:33bec3f294a63aa41361b2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const email = document.getElementById('username').value.trim().toLowerCase() + "@pi.quest";
            auth.signInWithEmailAndPassword(email, document.getElementById('password').value).catch(e => {
                document.getElementById('auth-error').innerText = "Zugriff verweigert!";
            });
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-section').style.display = user ? 'none' : 'block';
            document.getElementById('leaderboard-section').style.display = user ? 'block' : 'none';
            if(user) loadLeaderboard(user.uid);
        });

        function loadLeaderboard(uid) {
            db.collection("users").orderBy("highscore", "desc").limit(100).onSnapshot(snap => {
                const tbody = document.querySelector('#leaderboard-table tbody');
                tbody.innerHTML = "";
                let index = 1;
                snap.forEach(doc => {
                    const p = doc.data();
                    const isMe = doc.id === uid;
                    if(isMe) {
                        document.getElementById('welcome-name').innerText = "Hallo, " + (p.username || "User");
                        document.getElementById('my-score').innerText = p.highscore || 0;
                        document.getElementById('my-rank').innerText = index;
                    }
                    tbody.innerHTML += `<tr class="${isMe ? 'my-row' : ''}">
                        <td class="${index <= 3 ? 'gold' : ''}">${index}</td>
                        <td>${p.username || 'Anonym'}</td>
                        <td>${(p.highscore || 0).toLocaleString()}</td></tr>`;
                    index++;
                });
            });
        }
    </script>
</body>
</html>
