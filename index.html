<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pi-Runner Leaderboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050510; color: white; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .panel { background: rgba(20, 30, 60, 0.9); padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; width: 350px; text-align: center; margin-top: 50px; height: fit-content; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #304060; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(45deg, #0051ff, #00d2ff); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #err { color: #ff4d4d; font-size: 14px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        th, td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="panel">
        <div id="login-ui">
            <h1>PI-RUNNER</h1>
            <input type="text" id="u" placeholder="Pilotennname">
            <input type="password" id="p" placeholder="Passwort">
            <button onclick="login()">LOGIN</button>
            <p id="err"></p>
        </div>
        <div id="board-ui" style="display:none;">
            <h2>TOP PILOTEN</h2>
            <table id="board">
                <thead><tr><th>#</th><th>Pilot</th><th>Score</th></tr></thead>
                <tbody></tbody>
            </table>
            <button onclick="firebase.auth().signOut()" style="margin-top:20px; background:#304060;">LOGOUT</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyA0Et1D50vP8KnaRC1nyNN5dN0OGqpqq7c",
            authDomain: "lpmzt-5c267.firebaseapp.com",
            databaseURL: "https://lpmzt-5c267-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lpmzt-5c267",
            storageBucket: "lpmzt-5c267.firebasestorage.app",
            appId: "1:378438452791:web:33bec3f294a63aa41361b2"
        };
        firebase.initializeApp(config);

        function login() {
            const email = document.getElementById('u').value.trim().toLowerCase() + "@test.de";
            const pass = document.getElementById('p').value;
            firebase.auth().signInWithEmailAndPassword(email, pass).catch(e => {
                document.getElementById('err').innerText = "Fehler: " + e.message;
            });
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('board-ui').style.display = 'block';
                loadScores();
            } else {
                document.getElementById('login-ui').style.display = 'block';
                document.getElementById('board-ui').style.display = 'none';
            }
        });

        function loadScores() {
            const tbody = document.querySelector('#board tbody');
            firebase.database().ref('users').orderByChild('highscore').limitToLast(10).on('value', snap => {
                tbody.innerHTML = "";
                let list = [];
                snap.forEach(c => { list.push(c.val()); });
                list.reverse().forEach((p, i) => {
                    tbody.innerHTML += `<tr><td>${i+1}</td><td>${p.username}</td><td>${p.highscore}</td></tr>`;
                });
            });
        }
    </script>
</body>
</html>
