<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI-RUNNER | Infinity Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #0051ff;
            --bg-dark: #050510;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;

            /*  overflow: hidden; */                 /*===== Verhindert Scrollen des Bodys =====*/

            overflow-y: auto;  /* SCROLL AN */
            overflow-x: hidden;
        }

        /* Maximale Sternen-Animation */
        .stars-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #101530 0%, #050510 100%);
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: moveStars linear infinite;
        }

        @keyframes moveStars {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-1000px);
            }
        }

        /* Content & Panel */
        .content {
            width: 100%;
            max-width: 450px;
            padding: 60px 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .panel {
            background: rgba(15, 25, 50, 0.75);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        h1 {
            color: var(--primary);
            letter-spacing: 6px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px var(--primary);
            font-size: 2.2rem;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #304060;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        /* Leaderboard-Verschönerung */
        .score-badge-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 210, 255, 0.1);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            flex: 1;
        }

        .stat-label {
            font-size: 0.7rem;
            display: block;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-val {
            font-size: 1.2rem;
            font-weight: bold;
        }

        #leaderboard-container {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 12px;
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
            font-size: 0.8rem;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gold {
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 5px gold;
        }

        .my-row {
            background: rgba(0, 210, 255, 0.2);
        }

        #auth-error {
            font-weight: bold;
            margin-top: 10px;
        }


        .gold {
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 5px gold;
        }

        .silver {
            color: #c0c0c0;
            font-weight: bold;
            text-shadow: 0 0 5px #c0c0c0;
        }

        .bronze {
            color: #cd7f32;
            font-weight: bold;
            text-shadow: 0 0 5px #cd7f32;
        }


        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }

        .podium-item {
            width: 90px;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            background: rgba(0, 210, 255, 0.08);
            border: 1px solid rgba(0, 210, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            transition: 0.3s;
        }

        .podium-item.second {
            margin-bottom: 10px;
        }

        .podium-item.third {
            margin-bottom: 0;
        }

        .podium-item.first {
            margin-bottom: 25px;
            height: 110px;
            transform: scale(1.05);
            z-index: 2;
        }

        .podium-name {
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .podium-rank {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .podium-score {
            font-size: 1rem;
            opacity: 0.8;
        }

        .podium-item.first {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px gold;
            }

            to {
                box-shadow: 0 0 30px gold;
            }
        }

        tr:hover {
            background: rgba(0, 210, 255, 0.1);
        }

        .podium-item {
            opacity: 0;
            animation: rise 0.6s ease forwards;
        }

        .podium-item:nth-child(1) {
            animation-delay: 0.1s;
        }

        .podium-item:nth-child(2) {
            animation-delay: 0.2s;
        }

        .podium-item:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .podium-item.first {
            transform: translateY(-25px) scale(1.05);
            animation: rise 0.6s ease forwards, glow 2s infinite alternate;
        }

        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .leaderboard-controls {

            display: flex;
            gap: 10px;
            align-items: center;
        }

        #search-input {
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            outline: none;
            width: 160px;
        }

        #filter-btn {
            padding: 8px 12px;
            font-size: 0.8rem;
            border-radius: 10px;
        }

        #profile-btn {
            padding: 8px 12px;
            font-size: 0.8rem;
            border-radius: 10px;

            border: 1px solid #00d2ff;
            background: rgba(0, 210, 255, 0.12);
            color: white;
            cursor: pointer;

            transition: 0.2s;
        }

        #profile-btn:hover {
            transform: scale(1.05);
            background: rgba(0, 210, 255, 0.25);
        }

        .my-highlight {
            background: rgba(0, 210, 255, 0.45) !important;
            transform: scale(1.02);
            transition: 0.3s;
        }

    </style>
</head>

<body>
    <div class="stars-wrapper" id="star-field"></div>

    <div class="content">
        <section id="auth-section" class="panel">
            <h1>PI-RUNNER</h1>
            <input type="text" id="username" placeholder="Name">
            <input type="password" id="password" placeholder="Passwort">
            <button onclick="login()">ANMELDEN</button>
            <p id="auth-error" style="color: #ff4747;"></p>
        </section>

        <section id="leaderboard-section" class="panel" style="display: none;">
            <h2 id="welcome-name" style="margin: 0; color: white;">---</h2>

            <div class="score-badge-container">
                <div class="stat-item">
                    <span class="stat-label">REKORD</span>
                    <span class="stat-val" id="my-score">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">RANG</span>
                    <span class="stat-val" id="my-rank">?</span>
                </div>

            </div>
            <p id="gap-info" style="
                font-size: 0.8rem;
                margin-top: 10px;
                color: #00d2ff;
                opacity: 0.9;"> --- </p>
            <h3 style="color: var(--primary); font-size: 0.9rem; letter-spacing: 2px;">TOP 100 LIGA</h3>

            <div class="podium">
                <div class="podium-item second">
                    <div class="podium-name" id="p2-name">---</div>
                    <div class="podium-rank silver">#2</div>
                    <div class="podium-score" id="p2-score">0</div>
                </div>

                <div class="podium-item first">
                    <div class="podium-name" id="p1-name">---</div>
                    <div class="podium-rank gold">#1</div>
                    <div class="podium-score" id="p1-score">0</div>
                </div>

                <div class="podium-item third">
                    <div class="podium-name" id="p3-name">---</div>
                    <div class="podium-rank bronze">#3</div>
                    <div class="podium-score" id="p3-score">0</div>
                </div>
            </div>
            <div class="leaderboard-header">
                <h3 style="color: var(--primary); margin: 0;">TOP 100 LIGA</h3>

                <div class="leaderboard-controls">
                    <button id="filter-btn" onclick="toggleSearch()">Filter</button>

                    <button id="profile-btn" onclick="scrollToProfile()">
                        Mein Profil
                    </button>

                    <input type="text" id="search-input" placeholder="Spieler suchen..." oninput="filterPlayers()"
                        style="display:none;">
                </div>
            </div>
            <div id="leaderboard-container">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>NAME</th>
                            <th>PUNKTE</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>


            <button onclick="auth.signOut()"
                style="background: rgba(255,255,255,0.05); border: 1px solid #444; margin-top: 20px; font-size: 0.8rem;">LOGOUT</button>
        </section>
        <tr id="row-${p.id}" class="${isMe ? 'my-row' : ''}"></tr>

    </div>


    <script>


        // Berechnet den Punkte-Abstand zum nächsten besseren Spieler
        function updateGap(uid) {
            if (!allPlayers.length) return;

            const myIndex = allPlayers.findIndex(p => p.id === uid);

            // Wenn nicht gefunden oder #1 → kein Gap
            if (myIndex <= 0) {
                document.getElementById("gap-info").innerText =
                    "Du bist auf Platz 1!";
                return;
            }

            const me = allPlayers[myIndex];
            const above = allPlayers[myIndex - 1];

            const diff = above.score - me.score;

            document.getElementById("gap-info").innerText =
                `⬆ Noch ${diff.toLocaleString()} Punkte bis ${above.name}`;
        }

        // Scrollt schnell zur eigenen Position im Leaderboard und hebt sie hervor
        function scrollToProfile() {
            const uid = firebase.auth().currentUser?.uid;
            if (!uid) return;

            const row = document.getElementById(`row-${uid}`);
            if (!row) return;

            row.scrollIntoView({
                behavior: "smooth",
                block: "center"
            });

            row.classList.add("my-highlight");

            setTimeout(() => {
                row.classList.remove("my-highlight");
            }, 1500);
        }


        // Sternen-Generator (Hohe Dichte & verschiedene Layer)
        function createStars() {
            const field = document.getElementById('star-field');
            const count = 250; // Viel mehr Sterne!

            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // Zufällige Größe (einige winzig, einige größer)
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;

                // Zufällige Position
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';

                // Zufällige Animationsdauer für Parallax-Effekt
                const duration = (Math.random() * 50 + 20) + 's';
                star.style.animationDuration = duration;
                star.style.animationDelay = '-' + (Math.random() * 50) + 's';

                field.appendChild(star);
            }

        }


        createStars();

        // Firebase Logic (Unverändert)
        const firebaseConfig = {
            apiKey: "AIzaSyA0Et1D50vP8KnaRC1nyNN5dNO0Gqpqq7c",
            authDomain: "lpmzt-5c267.firebaseapp.com",
            projectId: "lpmzt-5c267",
            storageBucket: "lpmzt-5c267.firebasestorage.app",
            messagingSenderId: "378438452791",
            appId: "1:378438452791:web:33bec3f294a63aa41361b2"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const email = document.getElementById('username').value.trim().toLowerCase() + "@pi.quest";
            auth.signInWithEmailAndPassword(email, document.getElementById('password').value).catch(e => {
                document.getElementById('auth-error').innerText = "Zugriff verweigert!";
            });
        }

        // Animiert Zahlen (z.B. Score) von Startwert zu Endwert
        function animateValue(element, start, end, duration = 800) {
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                element.innerText = Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) requestAnimationFrame(step);
            }

            requestAnimationFrame(step);
        }

        // Live Updates ohne Reload
        let lastScores = {};

        
        // Erkennt Score-Verbesserungen von Spielern (für spätere Features)
        function detectChanges(players) {
            players.forEach(p => {
                if (lastScores[p.id] && lastScores[p.id] < p.score) {
                    console.log(p.name + " improved!");
                }
                lastScores[p.id] = p.score;
            });
        }

        let currentSort = "highscore";

        // Sortiert Spieler nach Score (absteigend)
        function sortByScore(players) {
            return players.sort((a, b) => b.score - a.score);
        }

        // Reagiert auf Login/Logout und zeigt die richtige Ansicht
        auth.onAuthStateChanged(user => {
            document.getElementById('auth-section').style.display = user ? 'none' : 'block';
            document.getElementById('leaderboard-section').style.display = user ? 'block' : 'none';
            if (user) loadLeaderboard(user.uid);
        });


        // Tabelle auslagern
        let allPlayers = [];

        // Rendert die Leaderboard-Tabelle (ab Platz 4)
        function renderTable(players) {
            const tbody = document.querySelector('#leaderboard-table tbody');
            tbody.innerHTML = "";

            players.forEach((p, i) => {
                const rank = allPlayers.findIndex(x => x.id === p.id) + 1;
                const isMe = p.id === firebase.auth().currentUser?.uid;

                if (rank <= 3) return;

                tbody.innerHTML += `
        <tr class="${isMe ? 'my-row' : ''}">
            <td>${rank}</td>
            <td>${p.name}</td>
            <td>${p.score.toLocaleString()}</td>
        </tr>`;
            });
        }

        // Filter Button
        function toggleSearch() {
            const input = document.getElementById("search-input");

            const isHidden = input.style.display === "none" || input.style.display === "";

            if (isHidden) {
                input.style.display = "block";
                input.focus();
                renderTable(allPlayers);
            } else {
                input.style.display = "none";
                input.value = "";
                renderTable(allPlayers);
            }
        }


        // Live Suche Funktion
        function filterPlayers() {
            const value = document.getElementById("search-input").value.toLowerCase().trim();

            if (value === "") {
                renderTable(allPlayers);
                return;
            }

            const filtered = allPlayers.filter(p =>
                p.name.toLowerCase().includes(value)
            );

            renderTable(filtered);
        }

        // Lädt Live-Daten aus Firestore und baut das komplette Leaderboard
        function loadLeaderboard(uid) {
            db.collection("users").orderBy("highscore", "desc").limit(100).onSnapshot(snap => {

                const tbody = document.querySelector('#leaderboard-table tbody');
                tbody.innerHTML = "";

                let players = [];

                snap.forEach(doc => {
                    const p = doc.data();

                    players.push({
                        name: p.username || "Anonym",
                        score: p.highscore || 0,
                        id: doc.id
                    });
                });

                players.sort((a, b) => b.score - a.score);
                allPlayers = players;

                updateGap(uid);

                const top3 = players.slice(0, 3);

                // 👉 Tabelle ab Platz 4
                players.forEach((p, i) => {
                    const rank = i + 1;
                    const isMe = p.id === uid;

                    // 👉 Eigene Stats IMMER setzen
                    if (isMe) {
                        document.getElementById('welcome-name').innerText = "Hallo, " + p.name;
                        document.getElementById('my-score').innerText = p.score;
                        document.getElementById('my-rank').innerText = rank;
                    }

                    // 👉 Tabelle erst ab Platz 4 anzeigen
                    if (rank > 3) {
                        tbody.innerHTML += `
                <tr id="row-${p.id}" class="${isMe ? 'my-row' : ''}">
            <td>${rank}</td>
            <td>${p.name}</td>
            <td>${p.score.toLocaleString()}</td>
            </tr>`;
                    }
                });
                // neu=========================================================================
                // podium
                document.getElementById("p1-name").innerText = top3[0]?.name || "---";
                document.getElementById("p2-name").innerText = top3[1]?.name || "---";
                document.getElementById("p3-name").innerText = top3[2]?.name || "---";

                animateValue(document.getElementById("p1-score"), 0, top3[0]?.score || 0);
                animateValue(document.getElementById("p2-score"), 0, top3[1]?.score || 0);
                animateValue(document.getElementById("p3-score"), 0, top3[2]?.score || 0);
                // neu=========================================================================
            });
        }

    </script>
</body>

</html>
