<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI-RUNNER | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; background: #050510; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #101530 0%, #050510 100%); z-index: -1; }
        .content { width: 100%; max-width: 400px; padding: 40px 20px; }
        .panel { background: rgba(20, 30, 60, 0.8); backdrop-filter: blur(10px); border: 1px solid #00d2ff; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #00d2ff; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid #304060; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: linear-gradient(45deg, #0051ff, #00d2ff); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #auth-error { color: #ff4d4d; font-size: 14px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { padding: 10px; border-bottom: 2px solid #00d2ff; color: #00d2ff; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .gold { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="content">
        <section id="auth-section" class="panel">
            <h1>PI-RUNNER</h1>
            <p>Pilot Login</p>
            <input type="text" id="username" placeholder="Pilotennamen">
            <input type="password" id="password" placeholder="Passwort">
            <button onclick="login()">LOGIN</button>
            <p id="auth-error"></p>
        </section>

        <section id="leaderboard-section" class="panel" style="display: none;">
            <h2>Pilot: <span id="welcome-name">---</span></h2>
            <p>Dein Highscore: <span id="my-score">0</span></p>
            <hr>
            <h3>TOP 10 BESTENLISTE</h3>
            <table id="leaderboard-table">
                <thead>
                    <tr><th>#</th><th>Name</th><th>Score</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <button onclick="logout()" style="background: #304060; margin-top: 20px;">ABMELDEN</button>
        </section>
    </div>

    <script>
        // Deine Konfiguration (Exakt aus deinem kopierten Text)
        const firebaseConfig = {
            apiKey: "AIzaSyA0Et1D50vP8KnaRC1nyNN5dNO0Gqpqq7c",
            authDomain: "lpmzt-5c267.firebaseapp.com",
            databaseURL: "https://lpmzt-5c267-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lpmzt-5c267",
            storageBucket: "lpmzt-5c267.firebasestorage.app",
            messagingSenderId: "378438452791",
            appId: "1:378438452791:web:33bec3f294a63aa41361b2",
            measurementId: "G-M2QSLJ32X1"
        };

        // Firebase initialisieren
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() {
            const name = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('auth-error');

            // Hier deine Unity-Endung eintragen! (z.B. @test.de)
            const email = name.trim().toLowerCase() + "@test.de";

            auth.signInWithEmailAndPassword(email, pass).catch(e => {
                err.innerText = "Fehler: " + e.message;
            });
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-section').style.display = user ? 'none' : 'block';
            document.getElementById('leaderboard-section').style.display = user ? 'block' : 'none';
            if(user) {
                loadLeaderboard();
                // User-Daten aus Realtime Database holen
                db.ref('users/' + user.uid).once('value').then(snap => {
                    const d = snap.val();
                    if(d) {
                        document.getElementById('welcome-name').innerText = d.username;
                        document.getElementById('my-score').innerText = d.highscore;
                    }
                });
            }
        });

        function loadLeaderboard() {
            const tbody = document.querySelector('#leaderboard-table tbody');
            db.ref('users').orderByChild('highscore').limitToLast(10).on('value', snap => {
                tbody.innerHTML = "";
                let list = [];
                snap.forEach(c => { list.push(c.val()); });
                list.reverse().forEach((p, i) => {
                    tbody.innerHTML += `<tr><td class="${i===0?'gold':''}">${i+1}</td><td>${p.username}</td><td>${p.highscore}</td></tr>`;
                });
            });
        }
    </script>
</body>
</html>
